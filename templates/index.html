<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloot AI Web Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-w: 84px;
            --card-h: 120px;
            --mini-card-w: 40px;
            --mini-card-h: 56px;
            --hand-card-overlap: -22px;
            --hand-card-hover-lift: 26px;
            --hand-card-hover-scale: 1.08;
        }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }

        /* ── Card base ── */
        .playing-card {
            position: relative;
            width: var(--card-w);
            height: var(--card-h);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            background:
                linear-gradient(90deg, rgba(15,23,42,0.06) 1px, transparent 1px),
                linear-gradient(rgba(15,23,42,0.06) 1px, transparent 1px),
                #fff7df;
            background-size: 8px 8px;
            border: 3px solid #1e293b;
            border-radius: 6px;
            box-shadow:
                inset 0 0 0 2px #fef3c7,
                inset 0 0 0 4px rgba(30,41,59,0.18),
                3px 3px 0 rgba(0,0,0,0.3);
            font-family: "Courier New", monospace;
            font-weight: 900;
            image-rendering: pixelated;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            flex-shrink: 0;
        }
        .playing-card::before,
        .playing-card::after {
            content: attr(data-card);
            position: absolute;
            font-size: 0.72rem;
            line-height: 1;
        }
        .playing-card::before { top: 5px; left: 5px; }
        .playing-card::after  { right: 5px; bottom: 5px; transform: rotate(180deg); }
        .playing-card .card-rank { font-size: 1.7rem; letter-spacing: -0.06em; }
        .pixel-red   { color: #dc2626; }
        .pixel-black  { color: #111827; }
        .pixel-gold   { color: #ca8a04; }

        /* ── Face-down card ── */
        .card-back {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 6px;
            border: 3px solid #1e293b;
            background:
                repeating-linear-gradient(45deg, #1e3a5f 0px, #1e3a5f 4px, #162d4d 4px, #162d4d 8px);
            box-shadow:
                inset 0 0 0 2px #2563eb,
                inset 0 0 0 4px rgba(30,41,59,0.3),
                3px 3px 0 rgba(0,0,0,0.3);
            flex-shrink: 0;
            position: relative;
        }
        .card-back::after {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 3px;
        }

        /* ── Mini cards (past tricks) ── */
        .mini-card {
            width: var(--mini-card-w);
            height: var(--mini-card-h);
            border-width: 2px;
            box-shadow: inset 0 0 0 1px #fef3c7, 2px 2px 0 rgba(0,0,0,0.2);
        }
        .mini-card::before, .mini-card::after { display: none; }
        .mini-card .card-rank { font-size: 0.75rem; }
        .mini-card-back {
            width: var(--mini-card-w);
            height: var(--mini-card-h);
            border-width: 2px;
        }

        /* ── Table ── */
        .table-felt {
            background: radial-gradient(ellipse at center, #1a5c2e 0%, #14532d 50%, #0f4025 100%);
            border: 6px solid #4a2c0a;
            box-shadow:
                inset 0 0 60px rgba(0,0,0,0.4),
                0 0 0 4px #2d1a06,
                0 8px 32px rgba(0,0,0,0.5);
        }

        /* ── Player seats ── */
        .seat { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .seat-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 2px 10px;
            border-radius: 9999px;
            white-space: nowrap;
        }

        /* ── Opponent hands (side/top) ── */
        .opp-hand {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .opp-hand .card-back { margin-left: -14px; }
        .opp-hand .card-back:first-child { margin-left: 0; }

        .opp-hand-vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .opp-hand-vertical .card-back {
            margin-top: -52px;
            transform: rotate(90deg);
        }
        .opp-hand-vertical .card-back:first-child { margin-top: 0; }

        /* ── Player hand (bottom fan) ── */
        .hand-wrap {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 8px 0;
            min-height: 120px;
        }
        .hand-card {
            margin-left: var(--hand-card-overlap);
            cursor: default;
            transform: rotate(var(--fan-rotation)) translateY(var(--fan-offset));
            transform-origin: 50% 115%;
        }
        .hand-card:first-child { margin-left: 0; }
        .hand-card:hover {
            z-index: 30 !important;
            transform: rotate(var(--fan-rotation)) translateY(calc(var(--fan-offset) - var(--hand-card-hover-lift))) scale(var(--hand-card-hover-scale));
            box-shadow:
                inset 0 0 0 2px #fef3c7,
                inset 0 0 0 4px rgba(30,41,59,0.18),
                5px 5px 0 rgba(0,0,0,0.4),
                0 0 20px rgba(59,130,246,0.4);
        }
        .playable-card {
            cursor: pointer;
            border-color: #38bdf8;
            box-shadow:
                inset 0 0 0 2px #fef3c7,
                inset 0 0 0 4px rgba(30,41,59,0.18),
                3px 3px 0 rgba(0,0,0,0.3),
                0 0 14px rgba(56,189,248,0.5);
        }
        .playable-card:focus-visible { outline: 3px solid #38bdf8; outline-offset: 4px; }

        /* ── Trick center ── */
        .trick-center {
            position: relative;
            width: 320px;
            height: 270px;
        }
        .trick-slot {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .trick-slot.top    { top: 0;   left: 50%; transform: translateX(-50%); }
        .trick-slot.bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
        .trick-slot.left   { top: 50%; left: 0;   transform: translateY(-50%); }
        .trick-slot.right  { top: 50%; right: 0;   transform: translateY(-50%); }
        .trick-card-space {
            width: calc(var(--card-w) + 8px);
            height: calc(var(--card-h) + 6px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(148,163,184,0.18);
            border-radius: 6px;
            background: rgba(15,23,42,0.15);
        }
        .trick-slot .playing-card { width: var(--card-w); height: var(--card-h); }
        .trick-slot.left  .playing-card { transform: rotate(84deg);  }
        .trick-slot.right .playing-card { transform: rotate(-84deg); }
        .trick-slot.top   .playing-card { transform: rotate(180deg); }
        .trick-slot.bottom .playing-card { border-color: #2563eb; }
        /* Highlight the winning card while the completed trick lingers on the table. */
        .trick-card-won .playing-card {
            box-shadow:
                inset 0 0 0 2px #fef3c7,
                inset 0 0 0 4px rgba(30,41,59,0.18),
                3px 3px 0 rgba(0,0,0,0.3),
                0 0 18px 4px rgba(250,204,21,0.7);
        }

        /* ── Bid bubble (last bidding action, shown in front of the player) ── */
        .bid-bubble {
            position: absolute;
            z-index: 25;
            background: #fefce8;
            color: #1e293b;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 9999px;
            border: 2px solid #1e293b;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
            white-space: nowrap;
            pointer-events: none;
            animation: bid-pop 0.22s ease-out;
        }
        .bid-bubble::after {
            content: '';
            position: absolute;
            width: 0; height: 0;
            border: 6px solid transparent;
        }
        .bid-bubble.from-top::after    { bottom: -11px; left: 50%; transform: translateX(-50%); border-top-color: #1e293b; }
        .bid-bubble.from-bottom::after { top: -11px;    left: 50%; transform: translateX(-50%); border-bottom-color: #1e293b; }
        .bid-bubble.from-left::after   { right: -11px;  top: 50%;  transform: translateY(-50%); border-left-color: #1e293b; }
        .bid-bubble.from-right::after  { left: -11px;   top: 50%;  transform: translateY(-50%); border-right-color: #1e293b; }
        .bid-bubble.pass { background: #e2e8f0; color: #475569; }
        @keyframes bid-pop {
            from { transform: scale(0.6); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* ── Dealer marker ── */
        .dealer-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 9999px;
            background: radial-gradient(circle at 35% 30%, #fde68a, #d97706);
            color: #422006;
            font-weight: 800;
            font-size: 0.75rem;
            border: 2px solid #92400e;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        /* ── Set declaration badges ── */
        .set-badges {
            position: absolute;
            z-index: 24;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 150px;
            pointer-events: none;
        }
        .set-badge {
            background: #7c2d12;
            color: #fed7aa;
            font-weight: 700;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid #c2410c;
            box-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        /* ── End-of-round score animation ── */
        .score-burst {
            position: absolute;
            top: 50%;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .score-burst.side-left  { left: calc(50% - 280px); transform: translate(-50%, -50%); }
        .score-burst.side-right { left: calc(50% + 280px); transform: translate(-50%, -50%); }
        .score-burst .score-team-label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
        }
        .score-burst .score-team-value {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 1;
            text-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 0 28px currentColor;
            animation: score-burst-in 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .score-burst.you  { color: #34d399; }
        .score-burst.ai   { color: #fb7185; }
        @keyframes score-burst-in {
            0%   { transform: scale(0.2); opacity: 0; }
            60%  { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ── Scrollbar ── */
        .thin-scroll::-webkit-scrollbar { height: 4px; }
        .thin-scroll::-webkit-scrollbar-track { background: transparent; }
        .thin-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    </style>
</head>
<body class="min-h-screen flex flex-col p-3" style="background: #0f172a;">
    <!-- Header -->
    <header class="flex justify-between items-center mb-3 pb-3 border-b border-slate-700">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Baloot V2 AI</h1>
            <p class="text-xs text-slate-400">Play against MAPPO Agents</p>
        </div>
        <div class="flex gap-3 items-center">
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="text-slate-400 text-xs">Team 0 (You):</span>
                <span id="score-t0" class="font-bold text-emerald-400 ml-1">0</span>
            </div>
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="text-slate-400 text-xs">Team 1 (AI):</span>
                <span id="score-t1" class="font-bold text-rose-400 ml-1">0</span>
            </div>
            <select id="model-select" class="bg-slate-800 text-white text-sm px-2 py-1.5 rounded-lg border border-slate-700 outline-none focus:border-blue-500 max-w-[180px]">
                <option value="">Loading models...</option>
            </select>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-1.5 rounded-lg font-medium transition shadow-lg shadow-blue-500/20">New Game</button>
        </div>
    </header>

    <!-- Main content: Table -->
    <div class="flex flex-1 gap-4 min-h-0">
        <main class="flex-1 flex flex-col min-h-0">
            <!-- ═══ THE TABLE ═══ -->
            <div class="table-felt rounded-[40px] flex-1 flex flex-col items-center justify-between p-4 relative min-h-[560px]">

                <!-- ── End-of-round score animation (shown on both sides of the table center) ── -->
                <div id="score-burst-left" class="score-burst side-left you hidden">
                    <div class="score-team-label">You</div>
                    <div id="score-value-left" class="score-team-value">0</div>
                </div>
                <div id="score-burst-right" class="score-burst side-right ai hidden">
                    <div class="score-team-label">AI</div>
                    <div id="score-value-right" class="score-team-value">0</div>
                </div>

                <!-- ── Top seat: Teammate ── -->
                <div id="seat-teammate" class="seat relative">
                    <div class="flex items-center gap-2">
                        <div class="seat-label bg-emerald-900/60 text-emerald-300 border border-emerald-700/40">Teammate</div>
                        <div id="dealer-teammate" class="dealer-chip hidden">D</div>
                        <div id="bid-badge-teammate" class="hidden bg-yellow-900/60 text-yellow-300 border border-yellow-700/40 px-1.5 py-0.5 rounded font-bold text-[10px] uppercase tracking-wider shadow-sm"></div>
                    </div>
                    <div id="hand-teammate" class="opp-hand"></div>
                    <div id="bid-teammate" class="bid-bubble from-top hidden" style="top: 100%; left: 50%; transform: translate(-50%, 8px);"></div>
                    <div id="sets-teammate" class="set-badges" style="top: 100%; left: 50%; transform: translate(-50%, 8px);"></div>
                </div>

                <!-- ── Middle row: Left / Trick center / Right ── -->
                <div class="flex items-center justify-between w-full flex-1">
                    <!-- Left seat -->
                    <div id="seat-left" class="seat relative">
                        <div class="flex items-center gap-2">
                            <div class="seat-label bg-rose-900/60 text-rose-300 border border-rose-700/40">Left</div>
                            <div id="dealer-left" class="dealer-chip hidden">D</div>
                            <div id="bid-badge-left" class="hidden bg-yellow-900/60 text-yellow-300 border border-yellow-700/40 px-1.5 py-0.5 rounded font-bold text-[10px] uppercase tracking-wider shadow-sm"></div>
                        </div>
                        <div id="hand-left" class="opp-hand-vertical"></div>
                        <div id="bid-left" class="bid-bubble from-left hidden" style="left: 100%; top: 50%; transform: translate(12px, -50%);"></div>
                        <div id="sets-left" class="set-badges" style="left: 100%; top: 50%; transform: translate(12px, -50%);"></div>
                    </div>

                    <!-- Center: Bidding OR Trick area -->
                    <div class="flex-1 flex items-center justify-center">
                        <!-- Bidding -->
                        <div id="bidding-table" class="hidden text-center">
                            <p class="text-green-200/60 mb-3 font-medium tracking-widest uppercase text-xs">Face Up Card</p>
                            <div id="face-up-card" class="playing-card mx-auto"></div>
                            <div id="bidding-actions" class="mt-4 flex gap-2 flex-wrap justify-center min-h-[40px]"></div>
                        </div>
                        <!-- Playing: trick area -->
                        <div id="playing-table" class="hidden">
                            <div class="trick-center">
                                <div class="trick-slot top">
                                    <div id="trick-teammate" class="trick-card-space"></div>
                                </div>
                                <div class="trick-slot left">
                                    <div id="trick-left" class="trick-card-space"></div>
                                </div>
                                <div class="trick-slot right">
                                    <div id="trick-right" class="trick-card-space"></div>
                                </div>
                                <div class="trick-slot bottom">
                                    <div id="trick-you" class="trick-card-space"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right seat -->
                    <div id="seat-right" class="seat relative">
                        <div class="flex items-center gap-2">
                            <div id="dealer-right" class="dealer-chip hidden">D</div>
                            <div id="bid-badge-right" class="hidden bg-yellow-900/60 text-yellow-300 border border-yellow-700/40 px-1.5 py-0.5 rounded font-bold text-[10px] uppercase tracking-wider shadow-sm"></div>
                            <div class="seat-label bg-rose-900/60 text-rose-300 border border-rose-700/40">Right</div>
                        </div>
                        <div id="hand-right" class="opp-hand-vertical"></div>
                        <div id="bid-right" class="bid-bubble from-right hidden" style="right: 100%; top: 50%; transform: translate(-12px, -50%);"></div>
                        <div id="sets-right" class="set-badges" style="right: 100%; top: 50%; transform: translate(-12px, -50%);"></div>
                    </div>
                </div>

                <!-- ── Bottom seat: You ── -->
                <div id="seat-you" class="seat w-full relative">
                    <div id="bid-you" class="bid-bubble from-bottom hidden" style="bottom: 100%; left: 50%; transform: translate(-50%, -8px);"></div>
                    <div id="sets-you" class="set-badges" style="bottom: 100%; left: 50%; transform: translate(-50%, -8px);"></div>
                    <div id="player-hand" class="hand-wrap"></div>
                    <div class="flex items-center gap-2">
                        <div class="seat-label bg-blue-900/60 text-blue-300 border border-blue-700/40">You</div>
                        <div id="dealer-you" class="dealer-chip hidden">D</div>
                        <div id="bid-badge-you" class="hidden bg-yellow-900/60 text-yellow-300 border border-yellow-700/40 px-1.5 py-0.5 rounded font-bold text-[10px] uppercase tracking-wider shadow-sm"></div>
                    </div>
                </div>
            </div>

            <!-- Actions bar -->
            <div id="actions-container" class="empty:hidden flex gap-2 flex-wrap items-center">
            </div>

            <!-- Past tricks row -->
            <div id="past-tricks-container" class="mt-3 bg-slate-800/30 p-3 rounded-lg border border-slate-700">
                <p class="text-slate-400 mb-2 font-medium text-xs">Past Tricks</p>
                <div id="past-tricks-list" class="flex gap-3 overflow-x-auto pb-1 thin-scroll"></div>
            </div>
        </main>
    </div>

    <script>
        let pollTimer = null;
        const AI_TURN_DELAY_MS = 1000;
        const TRICK_HOLD_MS = 3000;
        const FAN_MAX_DEG = 32;
        const FAN_MAX_OFFSET = 22;
        const HTML_ESCAPE_CHARS = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;', '`':'&#96;' };

        // Position keys ("you"/"right"/"teammate"/"left") used to anchor seat-specific UI.
        const POS_KEYS = ['you', 'right', 'teammate', 'left'];
        // Map backend display names to position keys (trick / last_trick use display names).
        const NAME_TO_POS = { "You":"you", "Your Right":"right", "Teammate":"teammate", "Your Left":"left" };
        const TRICK_SLOT = { you:"trick-you", right:"trick-right", teammate:"trick-teammate", left:"trick-left" };

        // ── Round/trick progression tracking (for animations & trick hold) ──
        let lastRound = null;
        let prevTrickCount = 0;
        let trickHoldUntil = 0;     // timestamp until which the completed trick stays on the table
        let heldTrick = null;       // cached last_trick + winner being displayed during the hold

        function escapeHtml(s) { return String(s||'').replace(/[&<>"'`]/g, c => HTML_ESCAPE_CHARS[c]); }

        function getCardColorClass(s) {
            if (!s) return 'pixel-gold';
            if (s.includes('\u2665') || s.includes('\u2666')) return 'pixel-red';
            if (s.includes('\u2660') || s.includes('\u2663')) return 'pixel-black';
            return 'pixel-gold';
        }

        function renderPixelCard(str, extra = '') {
            const safe = escapeHtml(str || '');
            const cc = getCardColorClass(str || '');
            return `<div class="playing-card ${cc} ${extra}" data-card="${safe}"><span class="card-rank">${safe}</span></div>`;
        }

        function setPixelCardElement(el, str, extra = '') {
            const safe = escapeHtml(str || '');
            el.className = `playing-card ${getCardColorClass(str || '')} ${extra}`;
            el.dataset.card = safe;
            el.innerHTML = `<span class="card-rank">${safe}</span>`;
        }

        function renderCardBacks(count) {
            let html = '';
            for (let i = 0; i < count; i++) html += '<div class="card-back"></div>';
            return html;
        }

        function formatCardDarkText(str) {
            if (!str) return '';
            if (str.includes('\u2665') || str.includes('\u2666')) return `<span class="text-red-400">${str}</span>`;
            if (str.includes('\u2660') || str.includes('\u2663')) return `<span class="text-slate-100">${str}</span>`;
            return `<span class="text-yellow-400">${str}</span>`;
        }

        function clearTrickSlots() {
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(TRICK_SLOT[pos]);
                el.innerHTML = '';
                el.parentElement.classList.remove('trick-card-won');
            });
        }

        // Render a list of {player, card} into the trick slots, optionally highlighting the winner.
        function renderTrickCards(cards, winnerPos) {
            clearTrickSlots();
            (cards || []).forEach(t => {
                const pos = NAME_TO_POS[t.player];
                if (!pos || !t.card) return;
                const slotEl = document.getElementById(TRICK_SLOT[pos]);
                slotEl.innerHTML = renderPixelCard(t.card);
                if (winnerPos && pos === winnerPos) {
                    slotEl.parentElement.classList.add('trick-card-won');
                }
            });
        }

        // Show the most recent bid for each player, anchored in front of their seat.
        function renderBidBubbles(lastBids) {
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(`bid-${pos}`);
                if (!el) return;
                const bid = lastBids ? lastBids[pos] : null;
                if (bid) {
                    el.textContent = bid;
                    el.classList.toggle('pass', String(bid).toLowerCase() === 'pass');
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        function clearBidBubbles() {
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(`bid-${pos}`);
                if (el) el.classList.add('hidden');
            });
        }

        // Highlight the dealer's seat with a marker chip.
        function renderDealerMarker(dealerPos) {
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(`dealer-${pos}`);
                if (el) el.classList.toggle('hidden', pos !== dealerPos);
            });
        }

        // Set declarations next to declaring players. Backend only sends sets that should be
        // visible (winning team's), so we just gate by round: round 1 (trick_count 0) and
        // round 2 (trick_count 1) show them; later they are hidden.
        function renderSetBadges(playerSets, trickCount) {
            const show = trickCount <= 1;
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(`sets-${pos}`);
                if (!el) return;
                const sets = (show && playerSets) ? playerSets[pos] : null;
                if (sets && sets.length) {
                    el.innerHTML = sets.map(s => `<span class="set-badge">${escapeHtml(s)}</span>`).join('');
                } else {
                    el.innerHTML = '';
                }
            });
        }

        function clearSetBadges() {
            POS_KEYS.forEach(pos => {
                const el = document.getElementById(`sets-${pos}`);
                if (el) el.innerHTML = '';
            });
        }

        // Big score animation on both sides of the table after a round completes.
        function showScoreBurst(score) {
            if (!Array.isArray(score)) return;
            const left = document.getElementById('score-burst-left');
            const right = document.getElementById('score-burst-right');
            document.getElementById('score-value-left').textContent = score[0];
            document.getElementById('score-value-right').textContent = score[1];
            left.classList.remove('hidden');
            right.classList.remove('hidden');
            // Restart the pop animation.
            [left, right].forEach(b => {
                const v = b.querySelector('.score-team-value');
                v.style.animation = 'none';
                void v.offsetWidth;
                v.style.animation = '';
            });
        }

        function hideScoreBurst() {
            document.getElementById('score-burst-left').classList.add('hidden');
            document.getElementById('score-burst-right').classList.add('hidden');
        }

        async function fetchModels() {
            try {
                const res = await fetch('/models');
                const models = await res.json();
                const sel = document.getElementById('model-select');
                sel.innerHTML = '';
                if (!models.length) { sel.innerHTML = '<option value="">No models found</option>'; return; }
                models.forEach(m => {
                    const o = document.createElement('option');
                    o.value = m; o.textContent = m;
                    if (m === "mappo_update_100.h5") o.selected = true;
                    sel.appendChild(o);
                });
            } catch(e) { console.error("Failed to load models", e); }
        }
        fetchModels();

        async function startGame() {
            clearTimeout(pollTimer);
            lastRound = null;
            prevTrickCount = 0;
            trickHoldUntil = 0;
            heldTrick = null;
            hideScoreBurst();
            clearBidBubbles();
            clearSetBadges();
            const model = document.getElementById('model-select').value;
            document.getElementById('actions-container').innerHTML = '';
            const res = await fetch('/start', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model}) });
            if (res.ok) fetchState();
        }

        async function takeAction(index) {
            document.getElementById('actions-container').innerHTML = '';
            document.getElementById('bidding-actions').innerHTML = '';
            await fetch('/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action_index:index}) });
            fetchState();
        }

        async function fetchState({ advanceAi = false } = {}) {
            clearTimeout(pollTimer);
            try {
                const res = await fetch(`/state${advanceAi ? '?advance_ai=1' : ''}`);
                if (!res.ok) return;
                const state = await res.json();
                const isHumanTurn = state.is_human_turn && !state.done;
                const now = Date.now();
                const holdActive = now < trickHoldUntil;

                document.getElementById('score-t0').innerText = state.scores[0];
                document.getElementById('score-t1').innerText = state.scores[1];

                // ── Dealer marker ──
                renderDealerMarker(state.dealer_position);

                // ── End-of-round score animation ──
                if (lastRound === null) {
                    lastRound = state.round;
                } else if (state.round > lastRound) {
                    lastRound = state.round;
                    if (state.last_round_score) showScoreBurst(state.last_round_score);
                }

                // ── Opponent hands ──
                const counts = state.opponent_hand_counts || {};
                const revealed = state.opponent_hands_revealed || {};
                
                ['teammate', 'left', 'right'].forEach(pos => {
                    const el = document.getElementById(`hand-${pos}`);
                    if (revealed[pos]) {
                        el.innerHTML = revealed[pos].map(cardStr => renderPixelCard(cardStr, 'mini-card')).join('');
                    } else {
                        el.innerHTML = renderCardBacks(counts[pos] || 0);
                    }
                });

                // ── Update bid badges ──
                ['you', 'teammate', 'left', 'right'].forEach(pos => {
                    const el = document.getElementById(`bid-badge-${pos}`);
                    if (el) el.classList.add('hidden');
                });
                if (state.phase === 'playing' && state.contract && state.buyer) {
                    let buyerPos = null;
                    if (state.buyer === 'You') buyerPos = 'you';
                    else if (state.buyer === 'Teammate') buyerPos = 'teammate';
                    else if (state.buyer === 'Your Left') buyerPos = 'left';
                    else if (state.buyer === 'Your Right') buyerPos = 'right';
                    
                    if (buyerPos) {
                        const badge = document.getElementById(`bid-badge-${buyerPos}`);
                        if (badge) {
                            badge.innerText = state.contract;
                            badge.classList.remove('hidden');
                        }
                    }
                }

                // ── Phase-specific center ──
                if (state.phase === 'bidding') {
                    document.getElementById('bidding-table').classList.remove('hidden');
                    document.getElementById('playing-table').classList.add('hidden');
                    setPixelCardElement(document.getElementById('face-up-card'), state.face_up, 'mx-auto');
                    // Last bid in front of each player; clear any leftover set badges.
                    renderBidBubbles(state.last_bids);
                    clearSetBadges();
                    prevTrickCount = 0;
                    trickHoldUntil = 0;
                    heldTrick = null;
                } else {
                    document.getElementById('bidding-table').classList.add('hidden');
                    document.getElementById('playing-table').classList.remove('hidden');
                    clearBidBubbles();
                    hideScoreBurst();

                    // ── Set declarations / reveals (round 1 & 2 only) ──
                    renderSetBadges(state.player_sets, state.trick_count || 0);

                    // ── Detect a just-completed trick to hold it briefly on the table ──
                    const tc = state.trick_count || 0;
                    if (!holdActive && tc > prevTrickCount && state.last_trick && state.last_trick.some(t => t.card)) {
                        heldTrick = { cards: state.last_trick, winner: state.last_trick_winner };
                        trickHoldUntil = now + TRICK_HOLD_MS;
                    }
                    prevTrickCount = tc;

                    // ── Render the trick (held completed trick, or the live one) ──
                    if (now < trickHoldUntil && heldTrick) {
                        renderTrickCards(heldTrick.cards, heldTrick.winner);
                    } else {
                        heldTrick = null;
                        renderTrickCards(state.trick, null);
                    }

                    // Past Tricks
                    const histCont = document.getElementById('past-tricks-list');
                    if (state.trick_history && state.trick_history.length > 0) {
                        histCont.innerHTML = '';
                        state.trick_history.forEach(th => {
                            let html = `<div class="bg-slate-800 p-2 rounded-lg border border-slate-700 min-w-[130px] shrink-0">
                                <div class="text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">Trick ${th.trick_number}</div>
                                <div class="flex gap-0.5 justify-center mb-1 flex-wrap">`;
                            th.cards.forEach(c => {
                                if (c.card) html += `<div class="cursor-help" title="${escapeHtml(c.player)}">${renderPixelCard(c.card,'mini-card')}</div>`;
                            });
                            html += `</div><div class="text-[10px] text-emerald-400 text-center font-semibold truncate">Won by ${th.winner}</div></div>`;
                            histCont.innerHTML += html;
                        });
                        histCont.scrollLeft = histCont.scrollWidth;
                    } else {
                        histCont.innerHTML = '<div class="text-slate-500 italic text-sm">No tricks played yet</div>';
                    }
                }

                // ── Player hand (visible, fanned) ──
                const handEl = document.getElementById('player-hand');
                handEl.innerHTML = '';
                const n = state.hand.length;
                const fanBase = Math.max(n - 1, 1);
                state.hand.forEach((hc, i) => {
                    const card = hc.text;
                    const safe = escapeHtml(card);
                    const spread = n > 1 ? (i / fanBase - 0.5) : 0;
                    const rot = spread * FAN_MAX_DEG;
                    const off = Math.abs(spread) * FAN_MAX_OFFSET;
                    const actionIdx = hc.action_index;
                    const canPlay = isHumanTurn && state.phase !== 'bidding' && actionIdx !== null;
                    const div = document.createElement('div');
                    div.className = `playing-card ${getCardColorClass(card)} hand-card ${canPlay ? 'playable-card' : ''}`;
                    div.dataset.card = safe;
                    div.style.setProperty('--fan-rotation', `${rot}deg`);
                    div.style.setProperty('--fan-offset', `${off}px`);
                    div.style.zIndex = i + 1;
                    div.innerHTML = `<span class="card-rank">${safe}</span>`;
                    if (canPlay) {
                        div.title = `Play ${safe}`;
                        div.tabIndex = 0;
                        div.setAttribute('role', 'button');
                        div.setAttribute('aria-label', `Play ${safe}`);
                        div.onclick = () => takeAction(actionIdx);
                        div.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); takeAction(actionIdx); } };
                    }
                    handEl.appendChild(div);
                });

                // ── Actions ──
                const actEl = document.getElementById('actions-container');
                const bidEl = document.getElementById('bidding-actions');
                actEl.innerHTML = '';
                bidEl.innerHTML = '';
                if (isHumanTurn && state.phase === 'bidding') {
                    state.valid_actions.forEach(act => {
                        const btn = document.createElement('button');
                        btn.className = 'bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white px-5 py-2.5 rounded-lg transition font-semibold text-lg';
                        btn.innerHTML = formatCardDarkText(act.text);
                        btn.onclick = () => takeAction(act.index);
                        bidEl.appendChild(btn);
                    });
                    actEl.innerHTML = '';
                } else if (isHumanTurn && (now < trickHoldUntil)) {
                    // Human can act, but keep the completed trick on the table a moment first.
                    actEl.innerHTML = '';
                    pollTimer = setTimeout(() => fetchState(), Math.max(trickHoldUntil - now, 0));
                } else if (isHumanTurn) {
                    actEl.innerHTML = '';
                } else if (!state.done) {
                    if (now < trickHoldUntil) {
                        // Hold the completed trick before advancing the AI.
                        actEl.innerHTML = '';
                        pollTimer = setTimeout(() => fetchState(), Math.max(trickHoldUntil - now, 0));
                    } else {
                        actEl.innerHTML = '';
                        pollTimer = setTimeout(() => fetchState({ advanceAi: true }), AI_TURN_DELAY_MS);
                    }
                } else {
                    actEl.innerHTML = '<span class="text-emerald-400 font-bold text-lg">Game Over!</span>';
                }

            } catch(err) { console.error("Error fetching state:", err); }
        }
    </script>
</body>
</html>
