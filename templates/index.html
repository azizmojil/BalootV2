<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloot AI Web Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --trick-card-left-near-horizontal: 84deg;
            --trick-card-right-near-horizontal: -84deg;
            --card-corner-font-size: 0.75rem;
            --card-rank-font-size: 1.6rem;
            --card-rank-letter-spacing: -0.08em;
            --hand-card-overlap: -22px;
            --hand-card-hover-lift: 24px;
            --hand-card-hover-scale: 1.06;
        }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { 
            transition: all 0.2s ease; 
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30,41,59,0.8);
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .bg-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .playing-card {
            position: relative;
            width: 78px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            background:
                linear-gradient(90deg, rgba(15, 23, 42, 0.06) 1px, transparent 1px),
                linear-gradient(rgba(15, 23, 42, 0.06) 1px, transparent 1px),
                #fff7df;
            background-size: 8px 8px;
            border: 4px solid #1e293b;
            border-radius: 3px;
            box-shadow:
                inset 0 0 0 3px #fef3c7,
                inset 0 0 0 6px rgba(30, 41, 59, 0.18),
                5px 5px 0 rgba(0, 0, 0, 0.35);
            font-family: "Courier New", monospace;
            font-weight: 900;
            image-rendering: pixelated;
            transition: transform 0.18s steps(3, end), box-shadow 0.18s steps(3, end);
        }
        .playing-card::before,
        .playing-card::after {
            content: attr(data-card);
            position: absolute;
            font-size: var(--card-corner-font-size);
            line-height: 1;
        }
        .playing-card::before { top: 6px; left: 6px; }
        .playing-card::after { right: 6px; bottom: 6px; transform: rotate(180deg); }
        .playing-card .card-rank {
            font-size: var(--card-rank-font-size);
            letter-spacing: var(--card-rank-letter-spacing);
        }
        .pixel-red { color: #dc2626; }
        .pixel-black { color: #111827; }
        .pixel-gold { color: #ca8a04; }
        .hand-wrap {
            min-height: 150px;
            padding-top: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
        }
        .hand-card {
            margin-left: var(--hand-card-overlap);
            cursor: default;
            transform: rotate(var(--fan-rotation)) translateY(var(--fan-offset));
            transform-origin: 50% 115%;
        }
        .hand-card:first-child { margin-left: 0; }
        .hand-card:hover {
            z-index: 30 !important;
            transform: rotate(var(--fan-rotation)) translateY(calc(var(--fan-offset) - var(--hand-card-hover-lift))) scale(var(--hand-card-hover-scale));
            box-shadow:
                inset 0 0 0 3px #fef3c7,
                inset 0 0 0 6px rgba(30, 41, 59, 0.18),
                7px 7px 0 rgba(0, 0, 0, 0.45),
                0 0 24px rgba(59, 130, 246, 0.45);
        }
        .trick-stage {
            position: relative;
            height: 320px;
            width: min(100%, 620px);
            margin: 0 auto;
        }
        .trick-slot {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .trick-slot.top { top: 0; left: 50%; transform: translateX(-50%); }
        .trick-slot.left { top: 50%; left: 0.75rem; transform: translateY(-50%); }
        .trick-slot.right { top: 50%; right: 0.75rem; transform: translateY(-50%); }
        .trick-slot.bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
        .trick-card-space {
            width: 88px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(148, 163, 184, 0.22);
            border-radius: 5px;
            background: rgba(15, 23, 42, 0.2);
        }
        .trick-slot.left .playing-card { transform: rotate(var(--trick-card-left-near-horizontal)) translateX(4px); }
        .trick-slot.right .playing-card { transform: rotate(var(--trick-card-right-near-horizontal)) translateX(-4px); }
        .trick-slot.top .playing-card { transform: rotate(180deg); }
        .trick-slot.bottom .playing-card { transform: rotate(0deg); border-color: #2563eb; }
        .mini-card {
            width: 34px;
            height: 48px;
            border-width: 2px;
            box-shadow: inset 0 0 0 2px #fef3c7, 3px 3px 0 rgba(0, 0, 0, 0.25);
        }
        .mini-card::before,
        .mini-card::after { display: none; }
        .mini-card .card-rank { font-size: 0.8rem; }
        .playable-card {
            cursor: pointer;
            border-color: #38bdf8;
            box-shadow:
                inset 0 0 0 3px #fef3c7,
                inset 0 0 0 6px rgba(30, 41, 59, 0.18),
                5px 5px 0 rgba(0, 0, 0, 0.35),
                0 0 18px rgba(56, 189, 248, 0.5);
        }
        .playable-card:focus-visible {
            outline: 3px solid #38bdf8;
            outline-offset: 5px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 bg-gradient">
    <header class="flex justify-between items-center mb-6 pb-4 border-b border-slate-700">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Baloot V2 AI</h1>
            <p class="text-sm text-slate-400">Play against MAPPO Agents</p>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-800 px-4 py-2 rounded-lg card">
                <span class="text-slate-400 text-sm">Team 0 (You):</span> 
                <span id="score-t0" class="font-bold text-emerald-400 ml-2">0</span>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-lg card">
                <span class="text-slate-400 text-sm">Team 1 (AI):</span> 
                <span id="score-t1" class="font-bold text-rose-400 ml-2">0</span>
            </div>
            <select id="model-select" class="bg-slate-800 text-white px-3 py-2 rounded-lg border border-slate-700 outline-none focus:border-blue-500 transition max-w-[200px]">
                <option value="">Loading models...</option>
            </select>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition shadow-lg shadow-blue-500/30">New Game</button>
        </div>
    </header>

    <div class="flex flex-1 gap-6">
        <!-- Main Game Area -->
        <main class="flex-1 flex flex-col">
            <!-- Game Info -->
            <div id="game-info" class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl mb-6 border border-slate-700 hidden">
                <div class="flex gap-6">
                    <div><span class="text-slate-400 text-sm">Phase:</span> <span id="phase" class="font-semibold text-yellow-400"></span></div>
                    <div><span class="text-slate-400 text-sm">Dealer:</span> <span id="dealer" class="font-semibold"></span></div>
                </div>
                <div id="contract-info" class="hidden flex gap-4 text-sm bg-slate-900/50 px-4 py-2 rounded-lg">
                    <div>Contract: <span id="contract" class="font-bold text-yellow-400"></span></div>
                    <div>Buyer: <span id="buyer" class="font-bold"></span></div>
                    <div>Trump: <span id="trump" class="font-bold text-red-400"></span></div>
                </div>
            </div>

            <!-- Table / Trick Area -->
            <div class="flex-1 flex items-center justify-center min-h-[300px] mb-6 relative">
                <!-- Bidding Phase -->
                <div id="bidding-table" class="hidden text-center">
                    <p class="text-slate-400 mb-4 font-medium tracking-widest uppercase text-sm">Face Up Card</p>
                    <div id="face-up-card" class="playing-card mx-auto text-3xl"></div>
                    <div id="bidding-actions" class="mt-5 flex gap-3 flex-wrap justify-center min-h-[50px]"></div>
                </div>

                <!-- Playing Phase -->
                <div id="playing-table" class="hidden w-full max-w-2xl">
                    <p class="text-center text-slate-400 mb-8 font-medium tracking-widest uppercase text-sm">Current Trick</p>
                    <div class="trick-stage">
                        <!-- Teammate -->
                        <div class="trick-slot top">
                            <span class="text-xs text-slate-500 mb-2">Teammate</span>
                            <div id="trick-teammate" class="trick-card-space"></div>
                        </div>
                        <!-- Left -->
                        <div class="trick-slot left">
                            <span class="text-xs text-slate-500 mb-2">Left</span>
                            <div id="trick-left" class="trick-card-space"></div>
                        </div>
                        <!-- Right -->
                        <div class="trick-slot right">
                            <span class="text-xs text-slate-500 mb-2">Right</span>
                            <div id="trick-right" class="trick-card-space"></div>
                        </div>
                        <!-- You -->
                        <div class="trick-slot bottom">
                            <div id="trick-you" class="trick-card-space"></div>
                            <span class="text-xs text-blue-400 mt-2">You</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Player Hand -->
            <div id="past-tricks-container" class="hidden w-full mt-2 bg-slate-800/30 p-4 rounded-xl border border-slate-700 mb-6">
                <p class="text-slate-400 mb-3 font-medium text-sm">Past Tricks</p>
                <div id="past-tricks-list" class="flex gap-4 overflow-x-auto pb-2 scrollbar-thin scrollbar-thumb-slate-600 scrollbar-track-transparent">
                </div>
            </div>

            <div class="mt-auto">
                <p class="text-slate-400 mb-3 text-sm font-medium">Your Hand</p>
                <div id="player-hand" class="hand-wrap"></div>
            </div>

            <!-- Actions -->
            <div class="mt-6">
                <p class="text-slate-400 mb-3 text-sm font-medium">Available Actions</p>
                <div id="actions-container" class="flex gap-3 flex-wrap min-h-[50px]">
                    <span class="text-slate-500 italic">Click 'New Game' to start</span>
                </div>
            </div>
        </main>

        <!-- Sidebar (Logs) -->
        <aside class="w-80 flex flex-col bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
            <div class="bg-slate-800 p-3 border-b border-slate-700 font-semibold text-sm">Game Logs</div>
            <div id="logs-container" class="flex-1 p-4 overflow-y-auto text-sm flex flex-col gap-2 font-mono h-[600px]"></div>
        </aside>
    </div>

    <script>
        let pollTimer = null;
        // Provides visible pacing between AI moves for better user experience.
        const AI_TURN_DELAY_MS = 1000;
        // Maximum hand-card rotation, vertical lift, and center point for the fan layout.
        const FAN_ROTATION_DEGREES = 38;
        const FAN_VERTICAL_OFFSET = 28;
        const FAN_CENTER_OFFSET = 0.5;
        const HTML_ESCAPE_CHARS = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
            '`': '&#96;'
        };

        function getCardColorClass(str) {
            if (!str) return 'pixel-gold';
            if (str.includes('♥') || str.includes('♦')) return 'pixel-red';
            if (str.includes('♠') || str.includes('♣')) return 'pixel-black';
            // Use gold for non-standard cards such as bid/action labels that do not include suits.
            return 'pixel-gold';
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"'`]/g, char => HTML_ESCAPE_CHARS[char]);
        }

        function renderPixelCard(str, extraClasses = '') {
            const cardText = str || '';
            const safeCardText = escapeHtml(cardText);
            const colorClass = getCardColorClass(cardText);
            return `<div class="playing-card ${colorClass} ${extraClasses}" data-card="${safeCardText}">
                <span class="card-rank">${safeCardText}</span>
            </div>`;
        }

        function setPixelCardElement(element, str, extraClasses = '') {
            const cardText = str || '';
            element.className = `playing-card ${getCardColorClass(cardText)} ${extraClasses}`;
            element.dataset.card = escapeHtml(cardText);
            element.innerHTML = `<span class="card-rank">${escapeHtml(cardText)}</span>`;
        }

        function formatCardText(str) {
            if (!str) return '';
            if (str.includes('♥') || str.includes('♦')) {
                return `<span class="text-red-500">${str}</span>`;
            }
            if (str.includes('♠') || str.includes('♣')) {
                return `<span class="text-slate-800">${str}</span>`;
            }
            return `<span class="text-yellow-500">${str}</span>`;
        }

        function formatCardDarkText(str) {
            if (!str) return '';
            if (str.includes('♥') || str.includes('♦')) {
                return `<span class="text-red-400">${str}</span>`;
            }
            if (str.includes('♠') || str.includes('♣')) {
                return `<span class="text-slate-100">${str}</span>`; 
            }
            return `<span class="text-yellow-400">${str}</span>`;
        }

        async function fetchModels() {
            try {
                const res = await fetch('/models');
                const models = await res.json();
                const select = document.getElementById('model-select');
                select.innerHTML = '';
                if (models.length === 0) {
                    select.innerHTML = '<option value="">No models found</option>';
                    return;
                }
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    if (m === "mappo_update_100.h5") opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error("Failed to load models", e);
            }
        }
        
        fetchModels();

        async function startGame() {
            clearTimeout(pollTimer);
            const modelSelect = document.getElementById('model-select');
            const selectedModel = modelSelect.value;
            document.getElementById('actions-container').innerHTML = '<span class="text-slate-500 italic animate-pulse">Initializing game...</span>';
            const res = await fetch('/start', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: selectedModel })
            });
            if (res.ok) fetchState();
        }

        async function takeAction(index) {
            document.getElementById('actions-container').innerHTML = '<span class="text-slate-500 italic animate-pulse">Processing...</span>';
            document.getElementById('bidding-actions').innerHTML = '';
            await fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action_index: index })
            });
            fetchState();
        }

        async function fetchState({ advanceAi = false } = {}) {
            clearTimeout(pollTimer);
            try {
                const res = await fetch(`/state${advanceAi ? '?advance_ai=1' : ''}`);
                if (!res.ok) return;
                const state = await res.json();
                const isHumanTurn = state.is_human_turn && !state.done;
                
                document.getElementById('game-info').classList.remove('hidden');
                
                // Info
                document.getElementById('score-t0').innerText = state.scores[0];
                document.getElementById('score-t1').innerText = state.scores[1];
                document.getElementById('phase').innerText = state.phase.toUpperCase();
                document.getElementById('dealer').innerText = state.dealer;

                if (state.phase === 'bidding') {
                    document.getElementById('bidding-table').classList.remove('hidden');
                    document.getElementById('playing-table').classList.add('hidden');
                    document.getElementById('contract-info').classList.add('hidden');
                    document.getElementById('past-tricks-container').classList.add('hidden');
                    
                    setPixelCardElement(document.getElementById('face-up-card'), state.face_up, 'mx-auto text-3xl');
                } else {
                    document.getElementById('bidding-table').classList.add('hidden');
                    document.getElementById('playing-table').classList.remove('hidden');
                    document.getElementById('contract-info').classList.remove('hidden');
                    
                    document.getElementById('contract').innerText = state.contract || '';
                    document.getElementById('buyer').innerText = state.buyer || '';
                    document.getElementById('trump').innerText = state.trump || 'None';

                    // Trick
                    const positions = { "Teammate": "trick-teammate", "Your Left": "trick-left", "Your Right": "trick-right", "You": "trick-you" };
                    Object.values(positions).forEach(id => document.getElementById(id).innerHTML = '');
                    
                    if (state.trick) {
                        state.trick.forEach(t => {
                            if (t.card && positions[t.player]) {
                                document.getElementById(positions[t.player]).innerHTML = renderPixelCard(t.card);
                            }
                        });
                    }

                    // Past Tricks
                    if (state.trick_history && state.trick_history.length > 0) {
                        document.getElementById('past-tricks-container').classList.remove('hidden');
                        const historyContainer = document.getElementById('past-tricks-list');
                        historyContainer.innerHTML = '';
                        state.trick_history.forEach(th => {
                            let trickHtml = `<div class="bg-slate-800 p-3 rounded-lg border border-slate-700 min-w-[150px] shrink-0">
                                <div class="text-xs text-slate-400 mb-2 font-bold uppercase tracking-wider">Trick ${th.trick_number}</div>
                                <div class="flex gap-1 justify-center mb-2 flex-wrap">`;
                            
                            th.cards.forEach(c => {
                                if (c.card) {
                                    trickHtml += `<div class="cursor-help" title="${escapeHtml(c.player)}">${renderPixelCard(c.card, 'mini-card')}</div>`;
                                }
                            });
                            
                            trickHtml += `</div>
                                <div class="text-xs text-emerald-400 text-center font-semibold truncate">Won by ${th.winner}</div>
                            </div>`;
                            historyContainer.innerHTML += trickHtml;
                        });
                        
                        // Scroll to the end to show the latest tricks
                        historyContainer.scrollLeft = historyContainer.scrollWidth;
                    } else {
                        document.getElementById('past-tricks-container').classList.add('hidden');
                    }
                }

                // Hand
                const handContainer = document.getElementById('player-hand');
                handContainer.innerHTML = '';
                const fanSpreadBase = Math.max(state.hand.length - 1, 1);
                state.hand.forEach((handCard, index) => {
                    const div = document.createElement('div');
                    const card = handCard.text;
                    const safeCard = escapeHtml(card);
                    // Normalize each card position around center to fan symmetrically from left to right.
                    const spread = state.hand.length > 1 ? (index / fanSpreadBase - FAN_CENTER_OFFSET) : 0;
                    const rotation = spread * FAN_ROTATION_DEGREES;
                    const offset = Math.abs(spread) * FAN_VERTICAL_OFFSET;
                    const actionIndex = handCard.action_index;
                    const canPlayCard = isHumanTurn && state.phase !== 'bidding' && actionIndex !== null;
                    div.className = `playing-card ${getCardColorClass(card)} hand-card ${canPlayCard ? 'playable-card' : ''}`;
                    div.dataset.card = safeCard;
                    div.style.setProperty('--fan-rotation', `${rotation}deg`);
                    div.style.setProperty('--fan-offset', `${offset}px`);
                    div.style.zIndex = index + 1;
                    div.innerHTML = `<span class="card-rank">${safeCard}</span>`;
                    if (canPlayCard) {
                        div.title = `Play ${safeCard}`;
                        div.tabIndex = 0;
                        div.setAttribute('role', 'button');
                        div.setAttribute('aria-label', `Play ${safeCard}`);
                        div.onclick = () => takeAction(actionIndex);
                        div.onkeydown = (event) => {
                            if (event.key === 'Enter' || event.key === ' ') {
                                event.preventDefault();
                                takeAction(actionIndex);
                            }
                        };
                    }
                    handContainer.appendChild(div);
                });

                // Actions
                const actionsContainer = document.getElementById('actions-container');
                const biddingActions = document.getElementById('bidding-actions');
                actionsContainer.innerHTML = '';
                biddingActions.innerHTML = '';
                if (isHumanTurn && state.phase === 'bidding') {
                    state.valid_actions.forEach(act => {
                        const btn = document.createElement('button');
                        btn.className = 'bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white px-4 py-2 rounded-lg transition card font-semibold';
                        btn.innerHTML = formatCardDarkText(act.text);
                        btn.onclick = () => takeAction(act.index);
                        biddingActions.appendChild(btn);
                    });
                    actionsContainer.innerHTML = '<span class="text-slate-500 italic">Choose a bid under the face-up card.</span>';
                } else if (isHumanTurn) {
                    actionsContainer.innerHTML = '<span class="text-blue-300 font-semibold">Click a highlighted card in your hand to play it.</span>';
                } else if (!state.done) {
                    actionsContainer.innerHTML = '<span class="text-slate-500 italic animate-pulse">Waiting for AI turns...</span>';
                    pollTimer = setTimeout(() => fetchState({ advanceAi: true }), AI_TURN_DELAY_MS);
                } else {
                    actionsContainer.innerHTML = '<span class="text-emerald-400 font-bold text-xl">Game Over!</span>';
                }

                // Logs
                const logsContainer = document.getElementById('logs-container');
                logsContainer.innerHTML = '';
                state.logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'text-slate-300 pb-2 border-b border-slate-700/50 last:border-0';
                    div.innerHTML = formatCardDarkText(log);
                    logsContainer.appendChild(div);
                });
                logsContainer.scrollTop = logsContainer.scrollHeight;

            } catch (err) {
                console.error("Error fetching state:", err);
            }
        }
    </script>
</body>
</html>
